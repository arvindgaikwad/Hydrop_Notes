<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1194, initial-scale=1.0">
<title>C4 — Color Picker Open (Tablet)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400;1,9..40,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #FCFCFC;
    --text-primary: #0F172A;
    --text-secondary: #64748B;
    --text-muted: #94A3B8;
    --border: #E2E8F0;
    --accent: #0F172A;
    --accent-active: #6366F1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    width: 1194px;
    height: 834px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }
  
  /* Canvas Background */
  .canvas-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: radial-gradient(circle, #D4D4D8 1px, transparent 1px);
    background-size: 28px 28px;
    z-index: 0;
  }

  /* Ink Content (faded) */
  .ink-layer {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.4;
  }

  /* Sidebar Toolbar */
  .toolbar-wrapper {
    position: absolute;
    top: 0; bottom: 0;
    left: 24px;
    display: flex;
    align-items: center;
    z-index: 10;
  }
  .toolbar {
    width: 64px;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(24px);
    border: 1px solid rgba(226, 232, 240, 0.8);
    box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
    border-radius: 20px;
    padding: 12px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .tool-btn {
    width: 48px; height: 48px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: var(--text-secondary);
  }
  .tool-btn.active {
    background: rgba(99, 102, 241, 0.1);
    color: var(--accent-active);
  }
  .color-indicator {
    width: 24px; height: 24px;
    border-radius: 12px;
    background: #EF4444; /* active color */
    border: 2px solid white;
    box-shadow: 0 0 0 2px var(--accent-active);
  }

  /* Popover */
  .popover {
    position: absolute;
    left: 104px; /* 24px margin + 64px toolbar + 16px gap */
    bottom: 250px; /* Aligned roughly with the color button */
    width: 280px;
    background: #FFFFFF;
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 16px 48px rgba(15, 23, 42, 0.12);
    padding: 20px;
    z-index: 20;
  }
  .popover::before {
    content: '';
    position: absolute;
    left: -6px;
    bottom: 40px; /* point to color button */
    width: 10px; height: 10px;
    background: #FFFFFF;
    border-left: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    transform: rotate(45deg);
  }
  
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  
  /* Colors Grid */
  .color-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
    justify-items: center;
  }
  .color-swatch {
    width: 36px; height: 36px;
    border-radius: 18px;
    cursor: pointer;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .color-swatch.active::after {
    content: '';
    width: 44px; height: 44px;
    border: 2px solid var(--accent-active);
    border-radius: 22px;
    position: absolute;
  }
  
  /* Recent Row */
  .recent-row {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  
  /* Custom Hex Input */
  .hex-input-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .custom-swatch {
    width: 36px; height: 36px;
    border-radius: 18px;
    background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);
  }
  .hex-input {
    flex: 1;
    height: 44px;
    background: #F1F5F9;
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
  }
  .hex-input span { color: var(--text-muted); font-family: monospace; font-size: 15px; }
  .hex-input input {
    border: none;
    background: transparent;
    font-family: monospace;
    font-size: 15px;
    color: var(--text-primary);
    text-transform: uppercase;
    outline: none;
  }

</style>
</head>
<body>

<div class="canvas-bg"></div>
<div class="ink-layer">
  <svg width="1194" height="834">
    <!-- Fake content -->
    <path d="M 300 250 Q 500 200 600 300 T 800 280" fill="none" stroke="#0F172A" stroke-width="2"/>
  </svg>
</div>

<div class="toolbar-wrapper">
  <div class="toolbar">
    <button class="tool-btn active">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/></svg>
    </button>
    <button class="tool-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l-6 6v3h9l3-3"/><path d="M22 12l-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4"/></svg>
    </button>
    <button class="tool-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16C2.5 15.5 2.5 14.5 3 14L13 4C13.5 3.5 14.5 3.5 15 4L20 9C20.5 9.5 20.5 10.5 20 11L11 20"/><path d="M16 16L12 12"/></svg>
    </button>
    <button class="tool-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 13a4.5 4.5 0 1 1 5-8.5"/><path d="M14 6h.01"/><path d="M18 10h.01"/><path d="M16 14h.01"/><path d="M12 17h.01"/><path d="M8 17h.01"/><path d="M5 14h.01"/><path d="M5 10h.01"/></svg>
    </button>
    <div style="height: 1px; width: 32px; background: var(--border); margin: 8px 0;"></div>
    <button class="tool-btn">
      <div class="color-indicator"></div>
    </button>
  </div>
</div>

<div class="popover">
  <div class="section-title">Presets</div>
  <div class="color-grid">
    <div class="color-swatch" style="background: #0F172A;"></div>
    <div class="color-swatch" style="background: #475569;"></div>
    <div class="color-swatch" style="background: #94A3B8;"></div>
    <div class="color-swatch" style="background: #E2E8F0;"></div>
    
    <div class="color-swatch active" style="background: #EF4444;"></div>
    <div class="color-swatch" style="background: #F97316;"></div>
    <div class="color-swatch" style="background: #F59E0B;"></div>
    <div class="color-swatch" style="background: #10B981;"></div>
    
    <div class="color-swatch" style="background: #06B6D4;"></div>
    <div class="color-swatch" style="background: #3B82F6;"></div>
    <div class="color-swatch" style="background: #6366F1;"></div>
    <div class="color-swatch" style="background: #8B5CF6;"></div>
  </div>
  
  <div class="section-title">Recent</div>
  <div class="recent-row">
    <div class="color-swatch" style="background: #EF4444;"></div>
    <div class="color-swatch" style="background: #0F172A;"></div>
    <div class="color-swatch" style="background: #10B981;"></div>
    <div class="color-swatch" style="background: #F59E0B;"></div>
  </div>
  
  <div class="section-title">Custom</div>
  <div class="hex-input-wrapper">
    <div class="custom-swatch"></div>
    <div class="hex-input">
      <span>#</span>
      <input type="text" value="EF4444">
    </div>
  </div>
</div>

</body>
</html>
