<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1194, initial-scale=1.0">
<title>C2 — Canvas Active Drawing (Tablet)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #FCFCFC;
    --bg-secondary: #FFFFFF;
    --bg-tertiary: #F1F5F9;
    --text-primary: #0F172A;
    --text-secondary: #64748B;
    --text-muted: #94A3B8;
    --border: #E2E8F0;
    --accent: #0F172A;
    --accent-active: #6366F1;
    --accent-glow: rgba(99, 102, 241, 0.10);
    --radius-card: 16px;
    --radius-btn: 12px;
    --radius-pill: 32px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    width: 1194px;
    height: 834px;
    margin: 0 auto;
    overflow: hidden;
    position: relative;
  }

  /* Canvas Header */
  .canvas-header {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 64px;
    padding: 0 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
    background: linear-gradient(180deg, var(--bg-primary) 70%, transparent);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .back-btn {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    border: none; background: none; color: var(--text-primary); cursor: pointer;
    border-radius: 10px;
  }
  .back-btn:hover { background: var(--bg-tertiary); }
  .header-divider {
    width: 1px;
    height: 24px;
    background: var(--border);
  }
  .page-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .page-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-left: 8px;
  }
  .header-center {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .header-action {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border: none; background: none;
    color: var(--text-muted); cursor: pointer;
    border-radius: 8px;
    transition: all 0.15s ease;
  }
  .header-action:hover {
    background: var(--bg-tertiary);
    color: var(--text-primary);
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sync-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    height: 28px;
    padding: 0 10px;
    border-radius: 14px;
    background: rgba(16, 185, 129, 0.08);
    font-size: 12px;
    font-weight: 500;
    color: #10B981;
  }
  .sync-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #10B981;
  }

  /* Dot Grid Canvas */
  .canvas {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: radial-gradient(circle, #D4D4D8 0.8px, transparent 0.8px);
    background-size: 28px 28px;
    background-position: 14px 14px;
  }

  /* Ink Layer */
  .ink-layer {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 2;
  }
  .ink-layer svg {
    width: 100%;
    height: 100%;
  }

  /* Vertical Tool Palette — Tablet: left sidebar */
  .tool-palette {
    position: absolute;
    left: 24px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 12px 8px;
    background: rgba(255, 255, 255, 0.90);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(226, 232, 240, 0.6);
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(15, 23, 42, 0.08);
  }
  .tool-btn {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    border-radius: 12px;
    cursor: pointer;
    color: var(--text-secondary);
    position: relative;
    transition: all 0.15s ease;
  }
  .tool-btn:hover {
    background: var(--bg-tertiary);
    color: var(--text-primary);
  }
  .tool-btn.active {
    background: var(--accent-glow);
    color: var(--accent-active);
  }
  .tool-btn.active::after {
    content: '';
    position: absolute;
    left: 4px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 16px;
    border-radius: 2px;
    background: var(--accent-active);
  }
  .tool-divider {
    width: 28px;
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }
  .color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--text-primary);
    border: 3px solid var(--bg-secondary);
    box-shadow: 0 0 0 1px var(--border);
    cursor: pointer;
    margin-top: 4px;
  }
  .stroke-preview {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .stroke-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-primary);
  }

  /* Zoom Indicator */
  .zoom-indicator {
    position: absolute;
    bottom: 24px;
    right: 48px;
    z-index: 15;
    height: 32px;
    padding: 0 12px;
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    align-items: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
  }

  /* Page Strip Mini */
  .page-strip {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 15;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px;
    background: rgba(255,255,255,0.90);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(226, 232, 240, 0.6);
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(15, 23, 42, 0.06);
  }
  .page-thumb {
    width: 40px;
    height: 52px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-secondary);
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .page-thumb.active {
    border-color: var(--accent-active);
    box-shadow: 0 0 0 2px rgba(99,102,241,0.15);
  }
  .page-thumb-lines {
    position: absolute;
    top: 8px; left: 6px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .page-thumb-lines div {
    height: 1px;
    background: var(--text-muted);
    opacity: 0.4;
  }
  .page-thumb-lines div:nth-child(1) { width: 18px; }
  .page-thumb-lines div:nth-child(2) { width: 24px; }
  .page-thumb-lines div:nth-child(3) { width: 14px; }
  .page-add {
    width: 40px;
    height: 52px;
    border-radius: 6px;
    border: 1px dashed var(--border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<div class="canvas"></div>

<div class="ink-layer">
  <svg viewBox="0 0 1194 834" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Title -->
    <text x="160" y="130" font-family="DM Sans" font-size="28" font-weight="600" fill="#0F172A">Forces and Motion</text>
    <path d="M160 142 L380 142" stroke="#6366F1" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    
    <!-- Left column: Notes -->
    <text x="160" y="190" font-family="DM Sans" font-size="16" fill="#334155">Newton's Laws of Motion:</text>
    
    <text x="170" y="224" font-family="DM Sans" font-size="15" fill="#334155">1. An object at rest stays at rest unless</text>
    <text x="185" y="248" font-family="DM Sans" font-size="15" fill="#334155">acted upon by an external force.</text>
    
    <text x="170" y="286" font-family="DM Sans" font-size="15" fill="#334155">2. F = ma (force = mass × acceleration)</text>
    
    <text x="170" y="324" font-family="DM Sans" font-size="15" fill="#334155">3. Every action has an equal and</text>
    <text x="185" y="348" font-family="DM Sans" font-size="15" fill="#334155">opposite reaction.</text>
    
    <!-- Highlighted formula box -->
    <rect x="152" y="380" width="380" height="72" rx="12" fill="rgba(99,102,241,0.04)" stroke="rgba(99,102,241,0.12)" stroke-width="1"/>
    <text x="172" y="410" font-family="DM Sans" font-size="14" font-weight="500" fill="#6366F1">Key Equation:</text>
    <text x="172" y="436" font-family="DM Sans" font-size="18" font-weight="500" fill="#0F172A">F = m · a    →    a = F/m</text>
    
    <!-- Right column: Force diagram -->
    <!-- Block -->
    <rect x="700" y="280" width="120" height="80" rx="4" stroke="#0F172A" stroke-width="2" fill="rgba(241, 245, 249, 0.5)"/>
    <text x="738" y="326" font-family="DM Sans" font-size="14" font-weight="500" fill="#0F172A">5 kg</text>
    
    <!-- Force arrows -->
    <!-- Up arrow (Normal) -->
    <line x1="760" y1="280" x2="760" y2="200" stroke="#10B981" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
    <text x="770" y="230" font-family="DM Sans" font-size="12" fill="#10B981">N = 49N</text>
    
    <!-- Down arrow (Weight) -->
    <line x1="760" y1="360" x2="760" y2="440" stroke="#EF4444" stroke-width="2.5" marker-end="url(#arrowRed)"/>
    <text x="770" y="415" font-family="DM Sans" font-size="12" fill="#EF4444">W = mg</text>
    
    <!-- Right arrow (Applied) -->
    <line x1="820" y1="320" x2="920" y2="320" stroke="#6366F1" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
    <text x="850" y="310" font-family="DM Sans" font-size="12" fill="#6366F1">F = 20N</text>
    
    <!-- Left arrow (Friction) -->
    <line x1="700" y1="320" x2="630" y2="320" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arrowYellow)"/>
    <text x="632" y="310" font-family="DM Sans" font-size="12" fill="#F59E0B">f = μN</text>
    
    <!-- Diagram label -->
    <text x="695" y="485" font-family="DM Sans" font-size="13" font-weight="500" fill="#64748B">Free Body Diagram</text>
    
    <!-- Bottom section notes -->
    <text x="160" y="530" font-family="DM Sans" font-size="16" font-weight="500" fill="#0F172A">Calculations:</text>
    <text x="170" y="564" font-family="DM Sans" font-size="15" fill="#334155">• Net force = F - f = 20 - μ(49)</text>
    <text x="170" y="594" font-family="DM Sans" font-size="15" fill="#334155">• If μ = 0.2: Fnet = 20 - 9.8 = 10.2N</text>
    <text x="170" y="624" font-family="DM Sans" font-size="15" fill="#334155">• Acceleration: a = 10.2/5 = 2.04 m/s²</text>
    
    <!-- Arrow markers -->
    <defs>
      <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
        <path d="M0 0 L10 5 L0 10" fill="none" stroke="#10B981" stroke-width="1.5"/>
      </marker>
      <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
        <path d="M0 0 L10 5 L0 10" fill="none" stroke="#EF4444" stroke-width="1.5"/>
      </marker>
      <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
        <path d="M0 0 L10 5 L0 10" fill="none" stroke="#6366F1" stroke-width="1.5"/>
      </marker>
      <marker id="arrowYellow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
        <path d="M0 0 L10 5 L0 10" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
      </marker>
    </defs>
  </svg>
</div>

<div class="canvas-header">
  <div class="header-left">
    <button class="back-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <div class="header-divider"></div>
    <span class="page-title">Physics 101</span>
    <span class="page-subtitle">Lecture 2 — Page 3</span>
  </div>
  <div class="header-center">
    <button class="header-action" title="Undo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
    </button>
    <button class="header-action" title="Redo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 11-2.13-9.36L23 10"/></svg>
    </button>
  </div>
  <div class="header-right">
    <div class="sync-badge"><div class="sync-dot"></div> Synced</div>
    <button class="header-action" title="Export">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </button>
    <button class="header-action" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
    </button>
  </div>
</div>

<div class="tool-palette">
  <button class="tool-btn active" title="Pen">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
  </button>
  <button class="tool-btn" title="Highlighter">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 11l-6 6v3h9l3-3"/><path d="M22 12l-4.6 4.6a2 2 0 01-2.8 0l-5.2-5.2a2 2 0 010-2.8L14 4"/></svg>
  </button>
  <button class="tool-btn" title="Eraser">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M20 20H7L3 16l9-9 8 8-4 4z"/><path d="M18 13l-1.5-1.5"/></svg>
  </button>
  <button class="tool-btn" title="Lasso Select">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="9" r="7"/><path d="M12 16c-1.5 2-3 4-3 6"/></svg>
  </button>
  <button class="tool-btn" title="Shapes">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
  </button>
  <div class="tool-divider"></div>
  <div class="stroke-preview"><div class="stroke-dot"></div></div>
  <div class="color-swatch"></div>
</div>

<div class="zoom-indicator">85%</div>

<div class="page-strip">
  <div class="page-thumb">
    <div class="page-thumb-lines"><div></div><div></div><div></div></div>
  </div>
  <div class="page-thumb">
    <div class="page-thumb-lines"><div></div><div></div><div></div></div>
  </div>
  <div class="page-thumb active">
    <div class="page-thumb-lines"><div></div><div></div><div></div></div>
  </div>
  <div class="page-thumb">
    <div class="page-thumb-lines"><div></div><div></div><div></div></div>
  </div>
  <button class="page-add">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

</body>
</html>
