<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>A2 — Onboarding: Infinite Canvas (Phone)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #FCFCFC;
    --bg-secondary: #FFFFFF;
    --bg-tertiary: #F1F5F9;
    --text-primary: #0F172A;
    --text-secondary: #64748B;
    --text-muted: #94A3B8;
    --border: #E2E8F0;
    --accent: #0F172A;
    --accent-active: #6366F1;
    --radius-btn: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    width: 390px;
    height: 844px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .illustration-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .text-area {
    padding: 0 32px 48px;
    text-align: center;
  }
  .headline {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
    line-height: 1.2;
  }
  .subtitle {
    font-size: 16px;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 48px;
  }
  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px 48px;
  }
  .skip-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
  }
  .dots {
    display: flex;
    gap: 8px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
  }
  .dot.active {
    background: var(--accent-active);
  }
  .next-btn {
    width: 56px;
    height: 56px;
    border-radius: 28px;
    background: var(--accent);
    color: white;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  
  /* Expanding rectangles animation */
  .expanding-canvas {
    width: 240px;
    height: 240px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .expanding-canvas svg {
    position: absolute;
  }
</style>
</head>
<body>

<div class="illustration-area">
  <div class="expanding-canvas">
    <svg width="240" height="240" viewBox="0 0 240 240" fill="none">
      <rect x="20" y="20" width="200" height="200" rx="16" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="8 8"/>
      <rect x="50" y="50" width="140" height="140" rx="12" stroke="#CBD5E1" stroke-width="2"/>
      <rect x="80" y="80" width="80" height="80" rx="8" fill="#F1F5F9" stroke="#6366F1" stroke-width="2"/>
      <path d="M100 120 L140 120" stroke="#6366F1" stroke-width="2" stroke-linecap="round"/>
      <path d="M120 100 L120 140" stroke="#6366F1" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<div class="text-area">
  <h1 class="headline">Write without boundaries</h1>
  <p class="subtitle">An infinite canvas that grows with your ideas. Never run out of space again.</p>
</div>

<div class="bottom-bar">
  <button class="skip-btn">Skip</button>
  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <button class="next-btn">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>
</div>

</body>
</html>
