<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>A3 — Onboarding: Sync Everywhere (Phone)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #FCFCFC;
    --text-primary: #0F172A;
    --text-secondary: #64748B;
    --text-muted: #94A3B8;
    --border: #E2E8F0;
    --accent: #0F172A;
    --accent-active: #6366F1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    width: 390px;
    height: 844px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .illustration-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .text-area {
    padding: 0 32px 48px;
    text-align: center;
  }
  .headline {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
    line-height: 1.2;
  }
  .subtitle {
    font-size: 16px;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 48px;
  }
  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px 48px;
  }
  .skip-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
  }
  .dots {
    display: flex;
    gap: 8px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
  }
  .dot.active {
    background: var(--accent-active);
  }
  .next-btn {
    width: 56px;
    height: 56px;
    border-radius: 28px;
    background: var(--accent);
    color: white;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="illustration-area">
  <svg width="280" height="280" viewBox="0 0 280 280" fill="none">
    <!-- Cloud -->
    <path d="M90 140 A30 30 0 0 1 120 110 A40 40 0 0 1 190 120 A30 30 0 0 1 180 170 L100 170 A25 25 0 0 1 90 140 Z" fill="#F1F5F9" stroke="#6366F1" stroke-width="2"/>
    
    <!-- Dotted lines -->
    <path d="M140 170 L80 220" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="6 6"/>
    <path d="M140 170 L140 240" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="6 6"/>
    <path d="M140 170 L200 220" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="6 6"/>
    
    <!-- Devices -->
    <rect x="50" y="210" width="30" height="50" rx="4" fill="white" stroke="#0F172A" stroke-width="2"/>
    <rect x="110" y="230" width="60" height="40" rx="4" fill="white" stroke="#0F172A" stroke-width="2"/>
    <rect x="180" y="210" width="50" height="40" rx="4" fill="white" stroke="#0F172A" stroke-width="2"/>
  </svg>
</div>

<div class="text-area">
  <h1 class="headline">Your notes, every device</h1>
  <p class="subtitle">Seamless sync. Start on your tablet, continue on your phone.</p>
</div>

<div class="bottom-bar">
  <button class="skip-btn">Skip</button>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot active"></div>
    <div class="dot"></div>
  </div>
  <button class="next-btn">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>
</div>

</body>
</html>
