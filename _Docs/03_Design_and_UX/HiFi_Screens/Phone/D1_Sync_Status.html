<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>D1 — Sync Status Details (Phone)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #FCFCFC;
    --bg-secondary: #FFFFFF;
    --bg-tertiary: #F1F5F9;
    --text-primary: #0F172A;
    --text-secondary: #64748B;
    --text-muted: #94A3B8;
    --border: #E2E8F0;
    --accent: #0F172A;
    --accent-active: #6366F1;
    --success: #10B981;
    --warning: #F59E0B;
    --error: #EF4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    width: 390px;
    height: 844px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
  }
  .header {
    height: 64px;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
  }
  .header-title {
    font-size: 18px;
    font-weight: 600;
  }
  .close-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: flex-end;
    background: none; border: none; color: var(--text-secondary);
    cursor: pointer;
  }
  
  .content {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
  }
  
  /* Sync Summary Card */
  .summary-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 32px;
  }
  .status-icon {
    width: 56px; height: 56px;
    border-radius: 28px;
    background: rgba(245, 158, 11, 0.1);
    color: var(--warning);
    display: flex; align-items: center; justify-content: center;
  }
  .summary-info h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .summary-info p {
    font-size: 14px;
    color: var(--text-secondary);
  }
  
  /* List Section */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  
  .notebook-list {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .list-item {
    display: flex;
    align-items: center;
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .list-item:last-child { border-bottom: none; }
  
  .item-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
    margin-right: 16px;
  }
  .item-info { flex: 1; }
  .item-title {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .item-meta {
    font-size: 13px;
    color: var(--text-muted);
  }
  .item-status {
    display: flex; align-items: center; justify-content: center;
  }
  .status-badge {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 8px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
  }
  .status-syncing { color: var(--warning); background: rgba(245,158,11,0.1); }
  .status-success { color: var(--success); background: rgba(16,185,129,0.1); }
  .status-error { color: var(--error); background: rgba(239,68,68,0.1); }

  @keyframes spin { 100% { transform: rotate(360deg); } }
  .spin-anim { animation: spin 2s linear infinite; }

  /* Footer */
  .footer {
    padding: 24px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
  }
  .sync-btn {
    width: 100%;
    height: 56px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
</style>
</head>
<body>

<div class="header">
  <div style="width:40px"></div>
  <div class="header-title">Sync Status</div>
  <button class="close-btn">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</div>

<div class="content">
  <div class="summary-card">
    <div class="status-icon spin-anim">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.5 2v6h-6M2.13 15.57a10 10 0 1 0 1.93-10.45"/><path d="M2.5 22v-6h6M21.87 8.43a10 10 0 1 0-1.93 10.45"/></svg>
    </div>
    <div class="summary-info">
      <h2>2 items pending</h2>
      <p>Syncing changes to cloud...</p>
    </div>
  </div>
  
  <div class="section-title">Notebooks</div>
  <div class="notebook-list">
    <!-- Syncing -->
    <div class="list-item">
      <div class="item-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div class="item-info">
        <div class="item-title">Physics 101</div>
        <div class="item-meta">8 pages</div>
      </div>
      <div class="item-status status-badge status-syncing">
        <svg class="spin-anim" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M2.13 15.57a10 10 0 1 0 1.93-10.45"/><path d="M2.5 22v-6h6M21.87 8.43a10 10 0 1 0-1.93 10.45"/></svg>
        Syncing
      </div>
    </div>
    
    <!-- Syncing -->
    <div class="list-item">
      <div class="item-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div class="item-info">
        <div class="item-title">Meeting Notes</div>
        <div class="item-meta">6 pages</div>
      </div>
      <div class="item-status status-badge status-syncing">
        <svg class="spin-anim" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M2.13 15.57a10 10 0 1 0 1.93-10.45"/><path d="M2.5 22v-6h6M21.87 8.43a10 10 0 1 0-1.93 10.45"/></svg>
        Syncing
      </div>
    </div>
    
    <!-- Success -->
    <div class="list-item">
      <div class="item-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      </div>
      <div class="item-info">
        <div class="item-title">Biology 301</div>
        <div class="item-meta">12 pages</div>
      </div>
      <div class="item-status status-badge status-success">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
        Synced
      </div>
    </div>
    
    <!-- Error -->
    <div class="list-item">
      <div class="item-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      </div>
      <div class="item-info">
        <div class="item-title">Personal Journal</div>
        <div class="item-meta">156 pages</div>
      </div>
      <div class="item-status status-badge status-error">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Error
      </div>
    </div>
  </div>
</div>

<div class="footer">
  <button class="sync-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M2.13 15.57a10 10 0 1 0 1.93-10.45"/><path d="M2.5 22v-6h6M21.87 8.43a10 10 0 1 0-1.93 10.45"/></svg>
    Sync Now
  </button>
</div>

</body>
</html>
