<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>E4 — Pro Upgrade / Paywall (Phone)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0F172A; /* Main background */
    --bg-card: #1E293B;
    --text-primary: #F8FAFC;
    --text-secondary: #94A3B8;
    --text-muted: #64748B;
    --border: #334155;
    --gold: #F59E0B;
    --gold-glow: rgba(245, 158, 11, 0.2);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    width: 390px;
    height: 844px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  
  /* Decorative Background */
  .bg-glow {
    position: absolute;
    top: -100px; right: -100px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--gold-glow), transparent 70%);
    z-index: 0;
    pointer-events: none;
  }
  
  /* Header */
  .header {
    position: relative;
    z-index: 10;
    height: 104px;
    padding: 54px 24px 16px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }
  .close-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    border: none; color: var(--text-primary);
    cursor: pointer;
  }
  
  .content {
    flex: 1;
    padding: 0 24px 24px;
    overflow-y: auto;
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
  }
  
  /* Hero */
  .hero {
    text-align: center;
    margin-bottom: 40px;
  }
  .pro-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #FCD34D, #F59E0B);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 12px 32px var(--gold-glow);
    color: #fff;
  }
  .hero-title {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }
  .hero-title span { color: var(--gold); }
  .hero-desc {
    font-size: 16px;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  
  /* Features */
  .features-list {
    margin-bottom: 40px;
  }
  .feature-item {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .feature-icon {
    width: 32px; height: 32px;
    border-radius: 16px;
    background: rgba(245, 158, 11, 0.1);
    color: var(--gold);
    display: flex; align-items: center; justify-content: center;
  }
  .feature-text {
    font-size: 16px;
    font-weight: 500;
  }
  
  /* Pricing Cards */
  .pricing-cards {
    display: flex;
    gap: 16px;
    margin-bottom: 40px;
  }
  .plan-card {
    flex: 1;
    background: var(--bg-card);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    position: relative;
    cursor: pointer;
    transition: all 0.2s;
  }
  .plan-card.active {
    border-color: var(--gold);
    background: rgba(245, 158, 11, 0.05);
  }
  .badge {
    position: absolute;
    top: -12px; left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: #fff;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .plan-name {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 8px;
    text-align: center;
  }
  .plan-price {
    font-size: 24px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 4px;
  }
  .plan-period {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
  }
  
  /* Action */
  .btn-primary {
    width: 100%;
    height: 60px;
    background: linear-gradient(135deg, #FCD34D, #F59E0B);
    color: #000;
    border: none;
    border-radius: 30px;
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 600;
    box-shadow: 0 12px 32px var(--gold-glow);
    cursor: pointer;
    margin-bottom: 16px;
  }
  .terms {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="header">
  <button class="close-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</div>

<div class="content">
  <div class="hero">
    <div class="pro-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </div>
    <div class="hero-title">Horizon <span>Pro</span></div>
    <div class="hero-desc">Unlock the full power of your digital canvas without edges.</div>
  </div>
  
  <div class="features-list">
    <div class="feature-item">
      <div class="feature-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="feature-text">Unlimited notebooks and pages</div>
    </div>
    <div class="feature-item">
      <div class="feature-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="feature-text">Sync seamlessly across devices</div>
    </div>
    <div class="feature-item">
      <div class="feature-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="feature-text">Premium pen styles & colors</div>
    </div>
    <div class="feature-item">
      <div class="feature-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="feature-text">Export in high-res vector (SVG)</div>
    </div>
  </div>
  
  <div class="pricing-cards">
    <div class="plan-card">
      <div class="plan-name">Monthly</div>
      <div class="plan-price">$2.99</div>
      <div class="plan-period">/ month</div>
    </div>
    
    <div class="plan-card active">
      <div class="badge">Save 40%</div>
      <div class="plan-name">Yearly</div>
      <div class="plan-price">$19.99</div>
      <div class="plan-period">/ year</div>
    </div>
  </div>
  
  <button class="btn-primary">Start 7-Day Free Trial</button>
  <div class="terms">Cancel anytime. Subscription auto-renews.</div>
</div>

</body>
</html>
