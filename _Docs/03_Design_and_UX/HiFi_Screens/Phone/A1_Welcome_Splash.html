<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>A1 — Welcome / Splash (Phone)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #FCFCFC;
    --bg-secondary: #FFFFFF;
    --bg-tertiary: #F1F5F9;
    --text-primary: #0F172A;
    --text-secondary: #64748B;
    --text-muted: #94A3B8;
    --border: #E2E8F0;
    --accent: #0F172A;
    --accent-active: #6366F1;
    --accent-glow: rgba(99, 102, 241, 0.10);
    --success: #10B981;
    --error: #EF4444;
    --pro-gradient: linear-gradient(135deg, #0F172A, #6366F1);
    --radius-card: 16px;
    --radius-btn: 12px;
    --radius-pill: 32px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    width: 390px;
    min-height: 844px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }
  .screen {
    width: 100%;
    height: 844px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 32px;
    position: relative;
  }
  .logo-mark {
    width: 80px;
    height: 80px;
    border-radius: 20px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 40px;
    box-shadow: 0 8px 32px rgba(15, 23, 42, 0.12);
  }
  .logo-mark svg {
    width: 40px;
    height: 40px;
  }
  .app-name {
    font-size: 32px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .tagline {
    font-size: 18px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 28px;
    text-align: center;
    max-width: 280px;
    margin-bottom: 64px;
  }
  .btn-primary {
    width: 100%;
    max-width: 326px;
    height: 56px;
    background: var(--accent);
    color: #FFFFFF;
    border: none;
    border-radius: var(--radius-btn);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s ease;
    margin-bottom: 16px;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary {
    width: 100%;
    max-width: 326px;
    height: 56px;
    background: transparent;
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius-btn);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .btn-secondary:hover { background: var(--bg-tertiary); }
  .bottom-text {
    position: absolute;
    bottom: 48px;
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    line-height: 20px;
  }
  .bottom-text a {
    color: var(--accent-active);
    text-decoration: none;
  }
  .dot-pattern {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: radial-gradient(circle, #E2E8F0 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.5;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="screen">
  <div class="dot-pattern"></div>
  
  <div class="logo-mark">
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 8 L32 8 L32 32 L8 32 Z" stroke="#FFFFFF" stroke-width="2" fill="none"/>
      <path d="M14 14 L26 14" stroke="#6366F1" stroke-width="2" stroke-linecap="round"/>
      <path d="M14 20 L22 20" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
      <path d="M14 26 L24 26" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    </svg>
  </div>
  
  <h1 class="app-name">Horizon Notes</h1>
  <p class="tagline">The canvas without edges.</p>
  
  <button class="btn-primary">Get Started</button>
  <button class="btn-secondary">I already have an account</button>
  
  <p class="bottom-text">
    By continuing, you agree to our<br>
    <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
  </p>
</div>
</body>
</html>
