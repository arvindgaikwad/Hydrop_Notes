<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>B5 — Search Overlay (Phone)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #FCFCFC;
    --bg-secondary: #FFFFFF;
    --bg-tertiary: #F1F5F9;
    --text-primary: #0F172A;
    --text-secondary: #64748B;
    --text-muted: #94A3B8;
    --border: #E2E8F0;
    --accent: #0F172A;
    --accent-active: #6366F1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    width: 390px;
    height: 844px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
  }
  .header {
    padding: 60px 24px 24px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
  }
  .search-container {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .search-bar {
    flex: 1;
    height: 48px;
    background: var(--bg-primary);
    border: 1px solid var(--accent-active);
    border-radius: 12px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.08);
  }
  .search-bar svg { color: var(--accent-active); }
  .search-bar input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    color: var(--text-primary);
    outline: none;
  }
  .cancel-btn {
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
  }
  
  .content {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
  }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 32px;
  }
  .chip {
    height: 36px;
    padding: 0 16px;
    border-radius: 18px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .results {
    display: flex;
    flex-direction: column;
  }
  .result-item {
    display: flex;
    gap: 16px;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .result-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: var(--bg-tertiary);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
  }
  .result-info {
    flex: 1;
  }
  .result-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 4px;
  }
  .match { color: var(--accent-active); font-weight: 600; }
  .result-context {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .result-meta {
    font-size: 12px;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<div class="header">
  <div class="search-container">
    <div class="search-bar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" value="bio" autofocus>
    </div>
    <button class="cancel-btn">Cancel</button>
  </div>
</div>

<div class="content">
  <div class="section-title">Recent Searches</div>
  <div class="chips">
    <div class="chip">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      physics
    </div>
    <div class="chip">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      meeting notes
    </div>
  </div>
  
  <div class="section-title">Results</div>
  <div class="results">
    <div class="result-item">
      <div class="result-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div class="result-info">
        <div class="result-title"><span class="match">Bio</span>logy 301</div>
        <div class="result-context">Notebook • 12 pages</div>
        <div class="result-meta">Updated 2h ago</div>
      </div>
    </div>
    
    <div class="result-item">
      <div class="result-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div class="result-info">
        <div class="result-title">Cell Division</div>
        <div class="result-context">...in the <span class="match">bio</span>logy lab we observed mitosis...</div>
        <div class="result-meta">Biology 301 • Page 3</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
