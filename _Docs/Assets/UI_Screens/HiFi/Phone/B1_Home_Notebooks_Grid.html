<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>B1 — Home: Notebooks Grid (Phone)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #FCFCFC;
    --bg-secondary: #FFFFFF;
    --bg-tertiary: #F1F5F9;
    --text-primary: #0F172A;
    --text-secondary: #64748B;
    --text-muted: #94A3B8;
    --border: #E2E8F0;
    --accent: #0F172A;
    --accent-active: #6366F1;
    --accent-glow: rgba(99, 102, 241, 0.10);
    --radius-card: 16px;
    --radius-btn: 12px;
    --radius-pill: 32px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    width: 390px;
    min-height: 844px;
    margin: 0 auto;
  }

  /* Status Bar */
  .status-bar {
    height: 54px;
    padding: 0 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    font-size: 15px;
    font-weight: 600;
    padding-bottom: 8px;
  }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  /* Header */
  .header {
    padding: 16px 24px 0;
    margin-bottom: 20px;
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .header-actions {
    display: flex;
    gap: 8px;
  }
  .icon-btn {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
  }
  .icon-btn:hover { background: var(--bg-tertiary); }

  /* Search */
  .search-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 48px;
    background: var(--bg-tertiary);
    border-radius: var(--radius-btn);
    padding: 0 16px;
    margin-bottom: 16px;
  }
  .search-bar svg { color: var(--text-muted); flex-shrink: 0; }
  .search-bar input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text-primary);
    outline: none;
  }
  .search-bar input::placeholder { color: var(--text-muted); }

  /* Filter Pills */
  .filters {
    display: flex;
    gap: 8px;
    padding: 0 24px;
    margin-bottom: 24px;
    overflow-x: auto;
  }
  .pill {
    height: 36px;
    padding: 0 16px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--border);
    background: var(--bg-secondary);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    transition: all 0.15s ease;
  }
  .pill.active {
    background: var(--accent);
    color: #FFFFFF;
    border-color: var(--accent);
  }

  /* Grid */
  .notebooks-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 0 24px;
    padding-bottom: 100px;
  }
  .notebook-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow 0.2s ease;
  }
  .notebook-card:hover {
    box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
  }
  .card-cover {
    width: 100%;
    aspect-ratio: 4 / 3;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cover-1 { background: #F0F4FF; }
  .cover-2 { background: #F0FDF4; }
  .cover-3 { background: #FFF7ED; }
  .cover-4 { background: #FDF2F8; }
  .cover-5 { background: #F5F3FF; }
  .cover-6 { background: #ECFEFF; }
  .cover-icon {
    width: 32px;
    height: 32px;
    opacity: 0.35;
  }
  .card-info {
    padding: 12px 14px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-meta {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .pro-badge {
    display: inline-flex;
    align-items: center;
    height: 18px;
    padding: 0 6px;
    border-radius: 9px;
    background: linear-gradient(135deg, #0F172A, #6366F1);
    color: #FFFFFF;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 96px;
    right: calc((100vw - 390px) / 2 + 24px);
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: var(--accent);
    color: #FFFFFF;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 24px rgba(15, 23, 42, 0.2);
    cursor: pointer;
  }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 390px;
    height: 80px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-around;
    padding-top: 12px;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
  }
  .nav-item.active { color: var(--accent); }
  .nav-item span {
    font-size: 11px;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="status-bar">
  <span>9:41</span>
  <div class="status-icons">
    <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="3" width="3" height="9" rx="1"/><rect x="4.5" y="1" width="3" height="11" rx="1"/><rect x="9" y="4" width="3" height="8" rx="1"/><rect x="13" y="0" width="3" height="12" rx="1"/></svg>
  </div>
</div>

<div class="header">
  <div class="header-row">
    <h1>My Notebooks</h1>
    <div class="header-actions">
      <button class="icon-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      </button>
    </div>
  </div>
  <div class="search-bar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" placeholder="Search notebooks...">
  </div>
</div>

<div class="filters">
  <button class="pill active">All</button>
  <button class="pill">Recent</button>
  <button class="pill">Favorites</button>
  <button class="pill">Shared</button>
</div>

<div class="notebooks-grid">
  <div class="notebook-card">
    <div class="card-cover cover-1">
      <svg class="cover-icon" viewBox="0 0 24 24" fill="none" stroke="#6366F1" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div class="card-info">
      <div class="card-title">Physics 101</div>
      <div class="card-meta">8 pages · 5h ago</div>
    </div>
  </div>

  <div class="notebook-card">
    <div class="card-cover cover-2">
      <svg class="cover-icon" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    </div>
    <div class="card-info">
      <div class="card-title">Biology 301</div>
      <div class="card-meta">12 pages · 2h ago <span class="pro-badge">PRO</span></div>
    </div>
  </div>

  <div class="notebook-card">
    <div class="card-cover cover-3">
      <svg class="cover-icon" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="1.5"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    </div>
    <div class="card-info">
      <div class="card-title">Creative Writing</div>
      <div class="card-meta">24 pages · Yesterday</div>
    </div>
  </div>

  <div class="notebook-card">
    <div class="card-cover cover-4">
      <svg class="cover-icon" viewBox="0 0 24 24" fill="none" stroke="#EC4899" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
    </div>
    <div class="card-info">
      <div class="card-title">Personal Journal</div>
      <div class="card-meta">156 pages · 1w ago</div>
    </div>
  </div>

  <div class="notebook-card">
    <div class="card-cover cover-5">
      <svg class="cover-icon" viewBox="0 0 24 24" fill="none" stroke="#8B5CF6" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="M3 9h18M9 21V9"/></svg>
    </div>
    <div class="card-info">
      <div class="card-title">Project Alpha</div>
      <div class="card-meta">42 pages · 3d ago</div>
    </div>
  </div>

  <div class="notebook-card">
    <div class="card-cover cover-6">
      <svg class="cover-icon" viewBox="0 0 24 24" fill="none" stroke="#06B6D4" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
    </div>
    <div class="card-info">
      <div class="card-title">Meeting Notes</div>
      <div class="card-meta">6 pages · Just now</div>
    </div>
  </div>
</div>

<button class="fab">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<nav class="bottom-nav">
  <button class="nav-item active">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
    <span>Home</span>
  </button>
  <button class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <span>Search</span>
  </button>
  <button class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
    <span>Favorites</span>
  </button>
  <button class="nav-item">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Profile</span>
  </button>
</nav>
</body>
</html>
