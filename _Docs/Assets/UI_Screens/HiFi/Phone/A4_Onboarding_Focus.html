<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>A4 — Onboarding: Built for Focus (Phone)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #FCFCFC;
    --text-primary: #0F172A;
    --text-secondary: #64748B;
    --text-muted: #94A3B8;
    --border: #E2E8F0;
    --accent: #0F172A;
    --accent-active: #6366F1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    width: 390px;
    height: 844px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .illustration-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .text-area {
    padding: 0 32px 48px;
    text-align: center;
  }
  .headline {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
    line-height: 1.2;
  }
  .subtitle {
    font-size: 16px;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 48px;
  }
  .bottom-bar {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 0 32px 48px;
  }
  .dots {
    display: flex;
    gap: 8px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
  }
  .dot.active {
    background: var(--accent-active);
  }
  .get-started-btn {
    width: 100%;
    height: 56px;
    border-radius: 12px;
    background: var(--accent);
    color: white;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
  }
  
  /* Floating toolbar */
  .mock-toolbar {
    width: 160px;
    height: 48px;
    background: white;
    border-radius: 24px;
    box-shadow: 0 8px 32px rgba(15, 23, 42, 0.08);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .mock-tool {
    width: 24px;
    height: 24px;
    border-radius: 4px;
    background: var(--border);
  }
  .mock-tool.active {
    background: var(--accent-active);
    opacity: 0.2;
  }
</style>
</head>
<body>

<div class="illustration-area">
  <svg width="280" height="280" viewBox="0 0 280 280" fill="none">
    <!-- Clean canvas lines -->
    <path d="M40 80 Q100 60 140 100 T240 120" stroke="#0F172A" stroke-width="2" fill="none"/>
    <path d="M40 140 Q100 120 140 160 T240 180" stroke="#64748B" stroke-width="2" stroke-dasharray="4 4" fill="none"/>
    
    <!-- Floating Toolbar -->
    <g transform="translate(60, 200)">
      <rect x="0" y="0" width="160" height="48" rx="24" fill="white" stroke="#E2E8F0" stroke-width="1"/>
      <!-- active tool -->
      <rect x="20" y="12" width="24" height="24" rx="4" fill="rgba(99,102,241,0.2)"/>
      <rect x="68" y="12" width="24" height="24" rx="4" fill="#F1F5F9"/>
      <rect x="116" y="12" width="24" height="24" rx="4" fill="#F1F5F9"/>
    </g>
  </svg>
</div>

<div class="text-area">
  <h1 class="headline">Tools that disappear</h1>
  <p class="subtitle">The toolbar hides while you write, so you can focus on what matters.</p>
</div>

<div class="bottom-bar">
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot active"></div>
  </div>
  <button class="get-started-btn">Get Started</button>
</div>

</body>
</html>
