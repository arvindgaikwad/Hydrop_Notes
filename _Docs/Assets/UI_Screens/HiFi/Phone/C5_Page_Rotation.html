<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>C5 — Page Rotation UI (Phone)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400;1,9..40,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #FCFCFC;
    --text-primary: #0F172A;
    --text-secondary: #64748B;
    --text-muted: #94A3B8;
    --border: #E2E8F0;
    --accent: #0F172A;
    --accent-active: #6366F1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #E2E8F0; /* Darker backdrop to show rotation */
    color: var(--text-primary);
    width: 390px;
    height: 844px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }
  
  /* Rotated Canvas */
  .canvas-wrapper {
    position: absolute;
    top: 50%; left: 50%;
    width: 844px;
    height: 390px;
    background: var(--bg-primary);
    transform: translate(-50%, -50%) rotate(90deg);
    box-shadow: 0 24px 80px rgba(0,0,0,0.1);
  }
  .canvas-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: radial-gradient(circle, #D4D4D8 0.8px, transparent 0.8px);
    background-size: 24px 24px;
  }
  .ink-layer {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }
  
  /* Guide Lines */
  .guide-line-h {
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 1px;
    background: var(--accent-active);
    opacity: 0.3;
  }
  .guide-line-v {
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 1px;
    background: var(--accent-active);
    opacity: 0.3;
  }

  /* Rotation Handle UI */
  .rotation-ui {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 240px; height: 240px;
    pointer-events: none;
  }
  .rotation-arc {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border: 2px dashed rgba(99, 102, 241, 0.4);
    border-radius: 50%;
  }
  .rotation-indicator {
    position: absolute;
    top: -24px; left: 50%;
    transform: translateX(-50%);
    background: var(--accent-active);
    color: white;
    padding: 6px 12px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
  }
  .rotation-knob {
    position: absolute;
    top: -12px; left: 50%;
    transform: translateX(-50%);
    width: 24px; height: 24px;
    background: white;
    border: 3px solid var(--accent-active);
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  /* Overlay Buttons */
  .done-btn {
    position: absolute;
    bottom: 48px; left: 50%;
    transform: translateX(-50%);
    height: 56px;
    padding: 0 32px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    box-shadow: 0 8px 32px rgba(15, 23, 42, 0.2);
    cursor: pointer;
    z-index: 20;
  }
</style>
</head>
<body>

<div class="canvas-wrapper">
  <div class="canvas-bg"></div>
  <div class="ink-layer">
    <svg width="844" height="390">
      <path d="M 100 100 Q 300 80 400 150 T 700 120" fill="none" stroke="#0F172A" stroke-width="2"/>
    </svg>
  </div>
</div>

<div class="guide-line-h"></div>
<div class="guide-line-v"></div>

<div class="rotation-ui">
  <div class="rotation-arc"></div>
  <div class="rotation-indicator">90°</div>
  <div class="rotation-knob"></div>
</div>

<button class="done-btn">Done</button>

</body>
</html>
