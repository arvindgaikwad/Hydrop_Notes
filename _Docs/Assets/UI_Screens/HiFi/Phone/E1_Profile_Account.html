<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>E1 — Profile / Account (Phone)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #FCFCFC;
    --bg-secondary: #FFFFFF;
    --bg-tertiary: #F1F5F9;
    --text-primary: #0F172A;
    --text-secondary: #64748B;
    --text-muted: #94A3B8;
    --border: #E2E8F0;
    --accent: #0F172A;
    --accent-active: #6366F1;
    --gold: #F59E0B;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    width: 390px;
    height: 844px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
  }
  
  /* Header */
  .header {
    height: 104px;
    padding: 54px 24px 16px;
    display: flex;
    align-items: center;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .back-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    background: none; border: none; color: var(--text-primary);
    cursor: pointer;
    margin-right: 12px;
  }
  .header-title {
    font-size: 20px;
    font-weight: 600;
  }
  
  .content {
    padding: 24px;
    flex: 1;
    overflow-y: auto;
  }
  
  /* Profile Card */
  .profile-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 32px;
  }
  .avatar {
    width: 72px; height: 72px;
    border-radius: 36px;
    background: var(--accent-active);
    color: white;
    font-size: 28px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }
  .profile-info { flex: 1; }
  .profile-name {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .profile-email {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .plan-badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 12px;
    background: var(--bg-tertiary);
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
  }
  
  /* Menu List */
  .menu-list {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .menu-item {
    display: flex;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
    margin-right: 16px;
  }
  .menu-text {
    flex: 1;
    font-size: 16px;
    font-weight: 500;
  }
  .chevron { color: var(--text-muted); }
  
  /* Highlighted Pro Upgrade */
  .pro-item {
    background: linear-gradient(to right, rgba(245, 158, 11, 0.05), rgba(245, 158, 11, 0.1));
  }
  .pro-item .menu-icon {
    background: rgba(245, 158, 11, 0.15);
    color: var(--gold);
  }
  .pro-item .menu-text { color: var(--gold); font-weight: 600; }
  .pro-item .chevron { color: var(--gold); }
  
  /* Sign Out */
  .sign-out {
    color: #EF4444;
  }
  .sign-out .menu-icon {
    background: rgba(239, 68, 68, 0.1);
    color: #EF4444;
  }
</style>
</head>
<body>

<div class="header">
  <button class="back-btn">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </button>
  <div class="header-title">Account</div>
</div>

<div class="content">
  <div class="profile-card">
    <div class="avatar">SJ</div>
    <div class="profile-info">
      <div class="profile-name">Sarah Jenkins</div>
      <div class="profile-email">sarah.j@example.com</div>
      <div class="plan-badge">Free Plan</div>
    </div>
  </div>
  
  <div class="menu-list">
    <div class="menu-item pro-item">
      <div class="menu-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </div>
      <div class="menu-text">Horizon Pro Upgrade</div>
      <svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </div>
  
  <div class="menu-list">
    <div class="menu-item">
      <div class="menu-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>
      </div>
      <div class="menu-text">Cloud Storage</div>
      <svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
    
    <div class="menu-item">
      <div class="menu-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </div>
      <div class="menu-text">App Settings</div>
      <svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  </div>
  
  <div class="menu-list">
    <div class="menu-item sign-out">
      <div class="menu-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </div>
      <div class="menu-text">Sign Out</div>
    </div>
  </div>
</div>

</body>
</html>
