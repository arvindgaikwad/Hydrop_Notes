<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1194, initial-scale=1.0">
<title>D1 — Sync Status Details (Tablet)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #FCFCFC;
    --bg-secondary: #FFFFFF;
    --bg-tertiary: #F1F5F9;
    --text-primary: #0F172A;
    --text-secondary: #64748B;
    --text-muted: #94A3B8;
    --border: #E2E8F0;
    --accent: #0F172A;
    --accent-active: #6366F1;
    --success: #10B981;
    --warning: #F59E0B;
    --error: #EF4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: rgba(15, 23, 42, 0.4);
    color: var(--text-primary);
    width: 1194px;
    height: 834px;
    margin: 0 auto;
    display: flex;
    justify-content: flex-end; /* Slide in from right */
    overflow: hidden;
  }
  
  /* Right Panel */
  .panel {
    width: 480px;
    height: 100%;
    background: var(--bg-primary);
    box-shadow: -12px 0 48px rgba(0, 0, 0, 0.1);
    display: flex;
    flex-direction: column;
  }
  
  .header {
    height: 80px;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
  }
  .header-title {
    font-size: 20px;
    font-weight: 600;
  }
  .close-btn {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: flex-end;
    background: none; border: none; color: var(--text-secondary);
    cursor: pointer;
  }
  
  .content {
    flex: 1;
    padding: 32px;
    overflow-y: auto;
  }
  
  /* Sync Summary Card */
  .summary-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 16px;
    margin-bottom: 40px;
  }
  .status-icon {
    width: 64px; height: 64px;
    border-radius: 32px;
    background: rgba(16, 185, 129, 0.1);
    color: var(--success);
    display: flex; align-items: center; justify-content: center;
  }
  .summary-info h2 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .summary-info p {
    font-size: 15px;
    color: var(--text-secondary);
  }
  
  /* List Section */
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  
  .notebook-list {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .list-item {
    display: flex;
    align-items: center;
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }
  .list-item:last-child { border-bottom: none; }
  
  .item-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
    margin-right: 16px;
  }
  .item-info { flex: 1; }
  .item-title {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .item-meta {
    font-size: 14px;
    color: var(--text-muted);
  }
  .item-status {
    display: flex; align-items: center; justify-content: center;
  }
  .status-badge {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    border-radius: 16px;
    font-size: 13px;
    font-weight: 600;
  }
  .status-success { color: var(--success); background: rgba(16,185,129,0.1); }

  /* Footer */
  .footer {
    padding: 32px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
  }
  .sync-btn {
    width: 100%;
    height: 56px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
</style>
</head>
<body>

<div class="panel">
  <div class="header">
    <div style="width:44px"></div>
    <div class="header-title">Sync Status</div>
    <button class="close-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  
  <div class="content">
    <div class="summary-card">
      <div class="status-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="summary-info">
        <h2>All synced</h2>
        <p>Your notebooks are up to date on all devices.</p>
      </div>
    </div>
    
    <div class="section-title">Notebooks</div>
    <div class="notebook-list">
      <!-- Success -->
      <div class="list-item">
        <div class="item-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div class="item-info">
          <div class="item-title">Physics 101</div>
          <div class="item-meta">8 pages · Today, 10:45 AM</div>
        </div>
        <div class="item-status status-badge status-success">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          Synced
        </div>
      </div>
      
      <!-- Success -->
      <div class="list-item">
        <div class="item-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        </div>
        <div class="item-info">
          <div class="item-title">Biology 301</div>
          <div class="item-meta">12 pages · Today, 9:20 AM</div>
        </div>
        <div class="item-status status-badge status-success">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          Synced
        </div>
      </div>
      
      <!-- Success -->
      <div class="list-item">
        <div class="item-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
        <div class="item-info">
          <div class="item-title">Meeting Notes</div>
          <div class="item-meta">6 pages · Yesterday, 4:30 PM</div>
        </div>
        <div class="item-status status-badge status-success">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          Synced
        </div>
      </div>
    </div>
  </div>
  
  <div class="footer">
    <button class="sync-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M2.13 15.57a10 10 0 1 0 1.93-10.45"/><path d="M2.5 22v-6h6M21.87 8.43a10 10 0 1 0-1.93 10.45"/></svg>
      Sync Now
    </button>
  </div>
</div>

</body>
</html>
