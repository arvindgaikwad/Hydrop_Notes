<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1194, initial-scale=1.0">
<title>D3 — Delete Confirmation Dialog (Tablet)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #FCFCFC;
    --bg-secondary: #FFFFFF;
    --text-primary: #0F172A;
    --text-secondary: #64748B;
    --border: #E2E8F0;
    --accent: #0F172A;
    --error: #EF4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: rgba(15, 23, 42, 0.4); /* Dimmed backdrop */
    color: var(--text-primary);
    width: 1194px;
    height: 834px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .dialog {
    width: 400px;
    background: #FFFFFF;
    border-radius: 24px;
    padding: 32px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  
  .dialog-icon {
    width: 64px; height: 64px;
    border-radius: 32px;
    background: rgba(239, 68, 68, 0.1);
    color: var(--error);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
  }
  
  .dialog-title {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .dialog-desc {
    font-size: 16px;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: 32px;
  }
  
  .actions {
    width: 100%;
    display: flex;
    gap: 16px;
  }
  .btn-secondary {
    flex: 1;
    height: 52px;
    background: transparent;
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-danger {
    flex: 1;
    height: 52px;
    background: var(--error);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="dialog">
  <div class="dialog-icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
  </div>
  <div class="dialog-title">Delete Notebook?</div>
  <div class="dialog-desc">Are you sure you want to delete <strong>'Physics 101'</strong>? This action cannot be undone.</div>
  
  <div class="actions">
    <button class="btn-secondary">Cancel</button>
    <button class="btn-danger">Delete</button>
  </div>
</div>

</body>
</html>
