<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1194, initial-scale=1.0">
<title>B2 — Notebook Detail: Pages List (Tablet)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #FCFCFC;
    --bg-secondary: #FFFFFF;
    --bg-tertiary: #F1F5F9;
    --text-primary: #0F172A;
    --text-secondary: #64748B;
    --text-muted: #94A3B8;
    --border: #E2E8F0;
    --accent: #0F172A;
    --accent-active: #6366F1;
    --radius-card: 16px;
    --radius-btn: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    width: 1194px;
    height: 834px;
    margin: 0 auto;
    display: flex;
    overflow: hidden;
  }
  
  /* Sidebar */
  .sidebar {
    width: 280px;
    height: 100%;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 32px 16px;
  }
  .back-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    margin-bottom: 32px;
    color: var(--text-secondary);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
  }
  .back-nav:hover { color: var(--text-primary); }
  
  .notebook-info {
    padding: 0 16px;
    margin-bottom: 32px;
  }
  .notebook-info h1 {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .notebook-info p {
    font-size: 14px;
    color: var(--text-secondary);
  }
  
  .menu-group {
    margin-bottom: 24px;
  }
  .menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    height: 48px;
    padding: 0 16px;
    border-radius: 12px;
    color: var(--text-primary);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .menu-item:hover { background: var(--bg-tertiary); }
  .menu-item.active {
    background: rgba(99, 102, 241, 0.08);
    color: var(--accent-active);
  }
  
  /* Main Content */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-primary);
  }
  .header {
    height: 80px;
    padding: 0 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--bg-primary);
  }
  .header h2 {
    font-size: 20px;
    font-weight: 600;
  }
  .header-actions {
    display: flex;
    gap: 12px;
  }
  .icon-btn {
    width: 44px; height: 44px;
    border-radius: 10px;
    border: none; background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-secondary);
  }
  .icon-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }

  .content {
    flex: 1;
    padding: 32px 48px;
    overflow-y: auto;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
  }
  
  .page-card {
    aspect-ratio: 3/4;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    position: relative;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(15,23,42,0.04);
    transition: all 0.2s ease;
  }
  .page-card:hover {
    box-shadow: 0 12px 32px rgba(15,23,42,0.08);
    transform: translateY(-2px);
  }
  .page-card.active {
    border-color: var(--accent-active);
    box-shadow: 0 0 0 2px rgba(99,102,241,0.2);
  }
  .page-card-content {
    position: absolute;
    top: 12px; left: 12px; right: 12px; bottom: 12px;
    background-image: radial-gradient(circle, #CBD5E1 1.5px, transparent 1.5px);
    background-size: 24px 24px;
    border-radius: 8px;
  }
  .ink-line {
    position: absolute;
    height: 1.5px;
    background: var(--text-primary);
    opacity: 0.6;
    border-radius: 1px;
  }
  .page-number {
    position: absolute;
    bottom: 12px; right: 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
  }
  .add-page-card {
    aspect-ratio: 3/4;
    border: 2px dashed var(--border);
    border-radius: var(--radius-card);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-muted);
    cursor: pointer;
    background: transparent;
    transition: all 0.2s ease;
  }
  .add-page-card span {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
  }
  .add-page-card:hover {
    background: var(--bg-tertiary);
    color: var(--text-primary);
    border-color: var(--text-secondary);
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="back-nav">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    My Notebooks
  </div>
  
  <div class="notebook-info">
    <h1>Biology 301</h1>
    <p>12 pages · Created May 15</p>
  </div>
  
  <div class="menu-group">
    <div class="menu-item active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
      Pages Grid
    </div>
    <div class="menu-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
      Filter / Sort
    </div>
    <div class="menu-item">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Export Notebook
    </div>
    <div class="menu-item" style="color: var(--error);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      Delete
    </div>
  </div>
</div>

<div class="main">
  <div class="header">
    <h2>All Pages</h2>
    <div class="header-actions">
      <button class="icon-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="icon-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      </button>
    </div>
  </div>
  
  <div class="content">
    <div class="grid">
      <div class="page-card">
        <div class="page-card-content">
          <div class="ink-line" style="top:20%; left:15%; width:60%; height:3px;"></div>
          <div class="ink-line" style="top:30%; left:15%; width:70%;"></div>
          <div class="ink-line" style="top:35%; left:15%; width:40%;"></div>
        </div>
        <div class="page-number">1</div>
      </div>
      
      <div class="page-card">
        <div class="page-card-content">
          <div class="ink-line" style="top:20%; left:15%; width:50%; height:3px;"></div>
          <div class="ink-line" style="top:30%; left:15%; width:65%;"></div>
          <circle cx="50%" cy="60%" r="30" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.3"/>
        </div>
        <div class="page-number">2</div>
      </div>
      
      <div class="page-card active">
        <div class="page-card-content">
          <div class="ink-line" style="top:20%; left:15%; width:75%; height:3px;"></div>
          <div class="ink-line" style="top:30%; left:15%; width:80%;"></div>
          <div class="ink-line" style="top:35%; left:15%; width:50%;"></div>
        </div>
        <div class="page-number">3</div>
      </div>
      
      <div class="page-card">
        <div class="page-card-content">
          <div class="ink-line" style="top:20%; left:15%; width:40%; height:3px;"></div>
        </div>
        <div class="page-number">4</div>
      </div>
      
      <button class="add-page-card">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Add Page</span>
      </button>
    </div>
  </div>
</div>
</body>
</html>
