<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1194, initial-scale=1.0">
<title>A2 — Onboarding: Infinite Canvas (Tablet)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #FCFCFC;
    --bg-secondary: #FFFFFF;
    --bg-tertiary: #F1F5F9;
    --text-primary: #0F172A;
    --text-secondary: #64748B;
    --text-muted: #94A3B8;
    --border: #E2E8F0;
    --accent: #0F172A;
    --accent-active: #6366F1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    width: 1194px;
    height: 834px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 600px;
    text-align: center;
    z-index: 10;
  }
  .expanding-canvas {
    width: 400px;
    height: 400px;
    margin-bottom: 48px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .headline {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 24px;
  }
  .subtitle {
    font-size: 20px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 64px;
  }
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 0 48px;
    position: absolute;
    bottom: 64px;
  }
  .skip-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
  }
  .dots {
    display: flex;
    gap: 12px;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
  }
  .dot.active {
    background: var(--accent-active);
  }
  .next-btn {
    width: 64px;
    height: 64px;
    border-radius: 32px;
    background: var(--accent);
    color: white;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="content">
  <div class="expanding-canvas">
    <svg width="400" height="400" viewBox="0 0 400 400" fill="none">
      <rect x="20" y="20" width="360" height="360" rx="24" stroke="#E2E8F0" stroke-width="3" stroke-dasharray="12 12"/>
      <rect x="80" y="80" width="240" height="240" rx="20" stroke="#CBD5E1" stroke-width="3"/>
      <rect x="140" y="140" width="120" height="120" rx="16" fill="#F1F5F9" stroke="#6366F1" stroke-width="3"/>
      <path d="M170 200 L230 200" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
      <path d="M200 170 L200 230" stroke="#6366F1" stroke-width="3" stroke-linecap="round"/>
    </svg>
  </div>
  <h1 class="headline">Write without boundaries</h1>
  <p class="subtitle">An infinite canvas that grows with your ideas.<br>Never run out of space again.</p>
</div>

<div class="controls">
  <button class="skip-btn">Skip</button>
  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <button class="next-btn">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>
</div>

</body>
</html>
